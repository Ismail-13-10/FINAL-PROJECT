<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harbor Stay Portal</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="portal-home" aria-labelledby="homeTitle">
      <div class="login-art portal-home-art">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">H</span>
          <div>
            <strong>Harbor Stay</strong>
            <span>Hotel operations portal</span>
          </div>
        </div>
        <div>
          <span class="eyebrow">Automated Hotel Booking & Room Service Portal</span>
          <h1 id="homeTitle">Choose a workspace.</h1>
        </div>
      </div>

      <div class="portal-choice-panel" aria-label="Portal links">
        <a class="portal-choice" href="guest/index.html">
          <strong>Guest Portal</strong>
          <span>Book rooms, view your stays, and send room-service requests.</span>
        </a>
        <a class="portal-choice" href="admin/index.html">
          <strong>Admin Portal</strong>
          <span>Manage active bookings and service request fulfillment.</span>
        </a>
      </div>
    </section>
  </body>
</html>
